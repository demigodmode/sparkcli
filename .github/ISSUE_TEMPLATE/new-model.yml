name: New model
description: Request or submit a model to be added to models.conf
labels: ["new model"]
body:
  - type: input
    id: model_url
    attributes:
      label: HuggingFace model page
      placeholder: https://huggingface.co/org/model-name
    validations:
      required: true

  - type: dropdown
    id: tested
    attributes:
      label: Submission type
      options:
        - "I tested this myself and it works"
        - "Requesting someone else test this"
    validations:
      required: true

  - type: input
    id: hardware
    attributes:
      label: Hardware
      description: What did you run it on?
      placeholder: DGX Spark, RTX 4090, etc.

  - type: textarea
    id: curl_output
    attributes:
      label: curl output
      description: Paste the output of `curl http://localhost:8000/v1/models`
      placeholder: |
        {"object":"list","data":[{"id":"Qwen/Qwen3-32B-FP8",...}]}

  - type: textarea
    id: flags
    attributes:
      label: Extra flags
      description: Any vLLM flags you needed beyond the defaults (e.g. --reasoning-parser, --tool-call-parser). Leave blank if none.

  - type: input
    id: docker_env
    attributes:
      label: Docker env vars
      description: Only needed for MoE models. Space-separated KEY=VALUE pairs passed to docker run (e.g. VLLM_FLASHINFER_MOE_BACKEND=latency). Leave blank if none.
      placeholder: VLLM_FLASHINFER_MOE_BACKEND=latency
