name: New model
description: Request or submit a model to be added to models.conf
labels: ["new model"]
body:
  - type: input
    id: model_url
    attributes:
      label: HuggingFace model page
      placeholder: https://huggingface.co/org/model-name
    validations:
      required: true

  - type: dropdown
    id: tested
    attributes:
      label: Did you test this yourself?
      options:
        - "Yes — I ran it and it works"
        - "No — requesting someone else test it"
    validations:
      required: true

  - type: input
    id: hardware
    attributes:
      label: Hardware
      description: What did you run it on?
      placeholder: DGX Spark, RTX 4090, etc.

  - type: textarea
    id: curl_output
    attributes:
      label: curl output
      description: Paste the output of `curl http://localhost:8000/v1/models`
      render: json

  - type: textarea
    id: flags
    attributes:
      label: Extra flags
      description: Any vLLM flags you needed beyond the defaults (e.g. --reasoning-parser, --tool-call-parser). Leave blank if none.
