# sparkcli docker environment registry
# Format: model_id | docker_env_vars (space-separated KEY=VALUE pairs)
#
# Only models that require non-default Docker env vars appear here.
# These are injected as -e KEY=VALUE into docker run, not passed to vLLM.
#
# Common cases:
#   VLLM_FLASHINFER_MOE_BACKEND=latency   Required for MoE models on GB10 (sm_121).
#                                         The throughput backend has SM121 kernel issues;
#                                         latency backend uses the Triton fallback which is stable.

openai/gpt-oss-20b        | VLLM_FLASHINFER_MOE_BACKEND=latency
openai/gpt-oss-120b       | VLLM_FLASHINFER_MOE_BACKEND=latency
Qwen/Qwen3-Coder-Next-FP8 | VLLM_FLASHINFER_MOE_BACKEND=latency
